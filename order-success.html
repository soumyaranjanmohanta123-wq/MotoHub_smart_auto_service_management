<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - MOTOHUB</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/components.js" defer></script>
    <style>
        .success-page {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 50px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background-color: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 30px;
        }
        .success-page h1 {
            color: #fff;
            font-family: var(--font-heading);
            font-size: 32px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .success-page p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .order-ref {
            background-color: var(--bg-dark);
            border: 1px dashed var(--border-light);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 4px;
            margin: 20px 0 40px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            font-family: var(--font-heading);
            font-size: 18px;
        }
        .action-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .action-btns .btn {
            padding: 12px 30px;
        }
    </style>
</head>

<body>

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <div class="container">
        <div class="success-page">
            <div class="success-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            <h1>Order Placed!</h1>
            <p>Thank you for your purchase. We've received your order and are getting it ready.</p>
            <p>Track your order status in your customer dashboard.</p>

            <div class="order-ref" id="order-ref-display">
                Reference ID: #MH-...
            </div>

            <div class="action-btns">
                <a href="dashboard-customer.html" class="btn btn-red outline-btn" style="background: transparent; color:#fff; border: 1px solid var(--border-color);">View Dashboard</a>
                <a href="index.html" class="btn btn-red">Continue Shopping</a>
            </div>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script>
    // Display real order ID from URL param or sessionStorage
    (function() {
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order') || sessionStorage.getItem('mh_order_id');
        const refEl = document.getElementById('order-ref-display');
        if (orderId) {
            refEl.textContent = 'Order ID: #MH-' + orderId;
        } else {
            refEl.textContent = 'Order Placed Successfully!';
        }
        // Clear session order data
        sessionStorage.removeItem('mh_order_id');
        sessionStorage.removeItem('mh_order_total');
        sessionStorage.removeItem('mh_order_gateway');
    })();
    </script>
</body>

</html>
